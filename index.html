<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF6B6B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="おとあそび">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>おとあそび 🎵</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', 'Hiragino Maru Gothic ProN', 'M PLUS Rounded 1c', sans-serif;
    background: #FFF8F0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 12px 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 15%, #FFD93D44 0%, transparent 45%),
      radial-gradient(circle at 85% 85%, #FF6B6B33 0%, transparent 45%),
      radial-gradient(circle at 50% 50%, #6BCB7722 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(1.8rem, 7vw, 2.8rem);
    font-weight: 900;
    color: #333;
    text-shadow: 3px 3px 0 #FFD93D;
    letter-spacing: -1px;
  }

  .subtitle {
    font-size: 0.9rem;
    color: #999;
    margin-top: 2px;
  }

  /* タブ */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .tab {
    padding: 8px 20px;
    border-radius: 999px;
    border: 3px solid transparent;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
    background: #eee;
    color: #999;
  }

  .tab.active {
    background: #333;
    color: white;
    border-color: #333;
  }

  /* グリッド */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 500px;
    position: relative;
    z-index: 1;
  }

  @media (min-width: 400px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
  }
  @media (min-width: 560px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  .page { display: none; }
  .page.active { display: contents; }

  .btn {
    aspect-ratio: 1;
    border: none;
    border-radius: 26px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: inherit;
    font-weight: 900;
    font-size: clamp(0.7rem, 2.8vw, 0.9rem);
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition:
      transform 0.07s cubic-bezier(0.34, 1.56, 0.64, 1),
      box-shadow 0.07s ease;
  }

  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 42%;
    background: rgba(255,255,255,0.22);
    border-radius: 26px 26px 50% 50%;
    pointer-events: none;
  }

  .btn:active {
    transform: translateY(5px) scale(0.93) !important;
  }

  .btn .emoji {
    font-size: clamp(1.8rem, 8vw, 3rem);
    line-height: 1;
    display: block;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 1;
  }

  .btn .label {
    position: relative;
    z-index: 1;
  }

  .btn.pop .emoji {
    animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop {
    0%   { transform: scale(1) rotate(0deg); }
    35%  { transform: scale(1.45) rotate(-12deg); }
    65%  { transform: scale(0.88) rotate(6deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* ボタンカラー */
  .btn[data-color="red"]    { background: #FF6B6B; box-shadow: 0 7px 0 #cc4a4a, 0 10px 18px #FF6B6B44; }
  .btn[data-color="yellow"] { background: #FFD93D; box-shadow: 0 7px 0 #ccaa00, 0 10px 18px #FFD93D44; color: #555; text-shadow: none; }
  .btn[data-color="green"]  { background: #6BCB77; box-shadow: 0 7px 0 #4a9a55, 0 10px 18px #6BCB7744; }
  .btn[data-color="blue"]   { background: #4D96FF; box-shadow: 0 7px 0 #2a6acc, 0 10px 18px #4D96FF44; }
  .btn[data-color="orange"] { background: #FF922B; box-shadow: 0 7px 0 #cc6600, 0 10px 18px #FF922B44; }
  .btn[data-color="purple"] { background: #CC5DE8; box-shadow: 0 7px 0 #9a3ab5, 0 10px 18px #CC5DE844; }
  .btn[data-color="teal"]   { background: #20C997; box-shadow: 0 7px 0 #14967a, 0 10px 18px #20C99744; }
  .btn[data-color="pink"]   { background: #F06595; box-shadow: 0 7px 0 #bb3370, 0 10px 18px #F0659544; }
  .btn[data-color="lime"]   { background: #94D82D; box-shadow: 0 7px 0 #6aa320, 0 10px 18px #94D82D44; }
  .btn[data-color="sky"]    { background: #22B8CF; box-shadow: 0 7px 0 #168ea0, 0 10px 18px #22B8CF44; }

  /* リップル */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.38);
    animation: ripple 0.55s ease-out forwards;
    pointer-events: none;
  }
  @keyframes ripple {
    from { transform: scale(0); opacity: 1; }
    to   { transform: scale(4.5); opacity: 0; }
  }

  /* パーティクル */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: fly 0.75s ease-out forwards;
  }
  @keyframes fly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* インストールバナー */
  #install-banner {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 12px 20px;
    border-radius: 16px;
    font-size: 0.9rem;
    font-weight: 800;
    z-index: 300;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    white-space: nowrap;
    gap: 8px;
    align-items: center;
  }
  #install-banner.show { display: flex; }
</style>
</head>
<body>

<header>
  <h1>🎵 おとあそび</h1>
  <p class="subtitle">ボタンをおしてみよう！</p>
</header>

<div class="tabs">
  <button class="tab active" data-tab="animals">🐾 どうぶつ</button>
  <button class="tab" data-tab="effects">✨ こうかおん</button>
</div>

<div class="grid">
  <!-- 動物 -->
  <div class="page active" data-page="animals">
    <button class="btn" data-color="orange" data-sound="cat"><span class="emoji">🐱</span><span class="label">ねこ</span></button>
    <button class="btn" data-color="yellow" data-sound="dog"><span class="emoji">🐶</span><span class="label">いぬ</span></button>
    <button class="btn" data-color="green"  data-sound="frog"><span class="emoji">🐸</span><span class="label">かえる</span></button>
    <button class="btn" data-color="blue"   data-sound="elephant"><span class="emoji">🐘</span><span class="label">ぞう</span></button>
    <button class="btn" data-color="red"    data-sound="chick"><span class="emoji">🐔</span><span class="label">にわとり</span></button>
    <button class="btn" data-color="purple" data-sound="cow"><span class="emoji">🐮</span><span class="label">うし</span></button>
    <button class="btn" data-color="teal"   data-sound="horse"><span class="emoji">🐴</span><span class="label">うま</span></button>
    <button class="btn" data-color="pink"   data-sound="lion"><span class="emoji">🦁</span><span class="label">らいおん</span></button>
    <button class="btn" data-color="sky"    data-sound="bird"><span class="emoji">🐦</span><span class="label">とり</span></button>
  </div>

  <!-- 効果音 -->
  <div class="page" data-page="effects">
    <button class="btn" data-color="red"    data-sound="pop"><span class="emoji">💥</span><span class="label">ポン！</span></button>
    <button class="btn" data-color="yellow" data-sound="coin"><span class="emoji">🪙</span><span class="label">コイン</span></button>
    <button class="btn" data-color="green"  data-sound="levelup"><span class="emoji">🌟</span><span class="label">レベルアップ</span></button>
    <button class="btn" data-color="blue"   data-sound="spring"><span class="emoji">🌀</span><span class="label">ピロピロ</span></button>
    <button class="btn" data-color="orange" data-sound="bell"><span class="emoji">🔔</span><span class="label">ベル</span></button>
    <button class="btn" data-color="purple" data-sound="drum"><span class="emoji">🥁</span><span class="label">たいこ</span></button>
    <button class="btn" data-color="teal"   data-sound="bubble"><span class="emoji">🫧</span><span class="label">ぽわん</span></button>
    <button class="btn" data-color="pink"   data-sound="slide"><span class="emoji">🎢</span><span class="label">ひゅ〜ん</span></button>
    <button class="btn" data-color="lime"   data-sound="tada"><span class="emoji">🎉</span><span class="label">やったー！</span></button>
    <button class="btn" data-color="purple" data-sound="magic"><span class="emoji">✨</span><span class="label">まほう</span></button>
    <button class="btn" data-color="sky"    data-sound="boing"><span class="emoji">🤪</span><span class="label">ボヨーン</span></button>
  </div>
</div>

<div class="particles" id="particles"></div>

<div id="install-banner">
  📲 ホーム画面に追加してオフラインで使う
</div>

const AudioContext = window.AudioContext || window.webkitAudioContext;
let ctx;
function getCtx() {
  if (!ctx) ctx = new AudioContext();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

// ========== 実音源再生 ==========
function playAudio(key) {
  const audio = new Audio(AUDIO_DATA[key]);
  audio.play().catch(() => {});
}

// ========== 音の定義 ==========
const SOUNDS = {
  // ヘルパー：フォルマントフィルター付き音源
  // ========== 動物 ==========

  // 🐱 ねこ：「にゃー」フォルマント合成
  // 声帯(sawtooth) → バンドパスフィルター2本でにゃーの母音成分を作る
  cat(ac)      { playAudio('cat');      },

  // 🐶 いぬ：「わんわん」2回吠え
  dog(ac)      { playAudio('dog');      },

  // 🐸 かえる：「ケロケロ」クリック感のある鳴き声
  frog(ac) {
    const t = ac.currentTime;
    for (let i = 0; i < 3; i++) {
      const off = i * 0.16;

      // 基音：硬質なパルス
      const src = ac.createOscillator();
      src.type = 'square';
      src.frequency.setValueAtTime(260, t+off);
      src.frequency.exponentialRampToValueAtTime(180, t+off+0.09);

      // バンドパスで「ケロ」の鼻腔共鳴
      const bp = ac.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=6;
      bp.frequency.setValueAtTime(900, t+off);
      bp.frequency.exponentialRampToValueAtTime(600, t+off+0.09);

      const master = ac.createGain();
      src.connect(bp); bp.connect(master); master.connect(ac.destination);
      master.gain.setValueAtTime(0, t+off);
      master.gain.linearRampToValueAtTime(0.3, t+off+0.01);
      master.gain.exponentialRampToValueAtTime(0.001, t+off+0.11);

      src.start(t+off); src.stop(t+off+0.12);

      // 冒頭のクリック音（舌のはじき）
      const clickBuf = ac.createBuffer(1, Math.floor(ac.sampleRate*0.008), ac.sampleRate);
      const cd = clickBuf.getChannelData(0);
      for(let j=0;j<cd.length;j++) cd[j]=(Math.random()*2-1)*(1-j/cd.length);
      const click = ac.createBufferSource(); click.buffer=clickBuf;
      const cg = ac.createGain(); cg.gain.value=0.25;
      click.connect(cg); cg.connect(ac.destination);
      click.start(t+off);
    }
  },

  // 🐘 ぞう：「パオーン」大きな鼻から吹く音
  elephant(ac) { playAudio('elephant'); },

  // 🐥 ひよこ：「ぴよぴよ」超高音のちいさな声
  chick(ac)    { playAudio('chick');    },

  // 🐮 うし：「もーーー」長くて低い
  cow(ac)      { playAudio('cow');      },

  // 🐷 ぶた：「ブーブー」鼻にかかった音
  horse(ac)    { playAudio('horse');    },

  // 🦁 らいおん：「ガオーッ」ガラガラした唸り声
  lion(ac)     { playAudio('lion');     },

  // 🐦 とり：「ちゅんちゅん」スズメっぽいさえずり
  bird(ac) {
    const t = ac.currentTime;
    // ちゅん×2（二音符の繰り返し）
    const phrases = [
      [0,    [2800, 3400, 2600]],
      [0.28, [2900, 3600, 2700]],
    ];
    phrases.forEach(([phraseOff, pitches]) => {
      pitches.forEach((pitch, i) => {
        const off = phraseOff + i * 0.08;
        const src = ac.createOscillator();
        src.type = 'sine';
        src.frequency.setValueAtTime(pitch, t+off);
        src.frequency.linearRampToValueAtTime(pitch*1.12, t+off+0.04);
        src.frequency.linearRampToValueAtTime(pitch*0.9, t+off+0.07);

        // ビブラート
        const vib = ac.createOscillator(); vib.frequency.value=22; vib.type='sine';
        const vibG = ac.createGain(); vibG.gain.value=80;
        vib.connect(vibG); vibG.connect(src.frequency);

        const bp = ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=3000; bp.Q.value=3;
        const master = ac.createGain();
        src.connect(bp); bp.connect(master); master.connect(ac.destination);
        master.gain.setValueAtTime(0, t+off);
        master.gain.linearRampToValueAtTime(0.14, t+off+0.01);
        master.gain.exponentialRampToValueAtTime(0.001, t+off+0.08);

        vib.start(t+off); vib.stop(t+off+0.08);
        src.start(t+off); src.stop(t+off+0.09);
      });
    });
  },

  // 効果音
  pop(ac) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine';
    const t = ac.currentTime;
    o.frequency.setValueAtTime(800, t);
    o.frequency.exponentialRampToValueAtTime(200, t + 0.12);
    g.gain.setValueAtTime(0.4, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.start(t); o.stop(t + 0.15);
  },
  coin(ac) {
    const t = ac.currentTime;
    [[1047,0],[1319,0.08],[1047,0.16]].forEach(([f,off]) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'triangle';
      o.frequency.setValueAtTime(f, t+off);
      g.gain.setValueAtTime(0.3, t+off);
      g.gain.exponentialRampToValueAtTime(0.001, t+off+0.25);
      o.start(t+off); o.stop(t+off+0.25);
    });
  },
  levelup(ac) {
    const t = ac.currentTime;
    [523,659,784,1047].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'square';
      const off = i * 0.1;
      o.frequency.setValueAtTime(f, t+off);
      g.gain.setValueAtTime(0.18, t+off);
      g.gain.exponentialRampToValueAtTime(0.001, t+off+0.18);
      o.start(t+off); o.stop(t+off+0.18);
    });
  },
  spring(ac) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine';
    const t = ac.currentTime;
    o.frequency.setValueAtTime(300, t);
    o.frequency.linearRampToValueAtTime(2400, t + 0.15);
    o.frequency.linearRampToValueAtTime(300, t + 0.4);
    o.frequency.linearRampToValueAtTime(2000, t + 0.5);
    o.frequency.linearRampToValueAtTime(400, t + 0.7);
    g.gain.setValueAtTime(0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.75);
    o.start(t); o.stop(t + 0.75);
  },
  bell(ac) {
    [1047,1319,1568,2093].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      const t = ac.currentTime + i * 0.14;
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.22, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
      o.start(t); o.stop(t + 1.0);
    });
  },
  drum(ac) {
    const t = ac.currentTime;
    // キック
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(28, t + 0.35);
    g.gain.setValueAtTime(0.6, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.start(t); o.stop(t + 0.4);
    // スネア
    const buf = ac.createBuffer(1, ac.sampleRate * 0.1, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const s = ac.createBufferSource(), g2 = ac.createGain();
    s.buffer = buf; s.connect(g2); g2.connect(ac.destination);
    g2.gain.setValueAtTime(0.28, t + 0.12);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    s.start(t + 0.12);
  },
  bubble(ac) {
    const t = ac.currentTime;
    for (let i = 0; i < 5; i++) {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      const off = i * 0.07;
      const f = 400 + Math.random() * 600;
      o.frequency.setValueAtTime(f, t+off);
      o.frequency.exponentialRampToValueAtTime(f * 1.5, t+off+0.12);
      g.gain.setValueAtTime(0.12, t+off);
      g.gain.exponentialRampToValueAtTime(0.001, t+off+0.13);
      o.start(t+off); o.stop(t+off+0.14);
    }
  },
  slide(ac) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine';
    const t = ac.currentTime;
    o.frequency.setValueAtTime(2000, t);
    o.frequency.exponentialRampToValueAtTime(100, t + 0.6);
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.65);
    o.start(t); o.stop(t + 0.65);
  },
  magic(ac) {
    // きらきら上昇するアルペジオ＋ランダムなキラキラ散布
    const t = ac.currentTime;
    const scale = [523, 659, 784, 988, 1319, 1568, 2093, 2637];
    scale.forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      const off = i * 0.07;
      o.frequency.setValueAtTime(f, t + off);
      o.frequency.linearRampToValueAtTime(f * 1.02, t + off + 0.25);
      g.gain.setValueAtTime(0, t + off);
      g.gain.linearRampToValueAtTime(0.14, t + off + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.5);
      o.start(t + off); o.stop(t + off + 0.5);
    });
    // キラキラ散布（高周波の短い音を散らす）
    for (let i = 0; i < 12; i++) {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      const off = Math.random() * 0.7;
      const f = 2000 + Math.random() * 3000;
      o.frequency.setValueAtTime(f, t + off);
      g.gain.setValueAtTime(0.06, t + off);
      g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.1);
      o.start(t + off); o.stop(t + off + 0.1);
    }
  },
  boing(ac) {
    // ボヨーン：低音→急上昇→ぐにゃぐにゃ減衰
    const t = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(60, t);
    o.frequency.exponentialRampToValueAtTime(800, t + 0.08);
    o.frequency.exponentialRampToValueAtTime(200, t + 0.25);
    o.frequency.exponentialRampToValueAtTime(400, t + 0.38);
    o.frequency.exponentialRampToValueAtTime(180, t + 0.55);
    o.frequency.exponentialRampToValueAtTime(300, t + 0.68);
    o.frequency.exponentialRampToValueAtTime(160, t + 0.85);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.45, t + 0.06);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.1);
    o.start(t); o.stop(t + 1.1);
    // ちょっとユーモラスなハーモニクス
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.connect(g2); g2.connect(ac.destination);
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(120, t);
    o2.frequency.exponentialRampToValueAtTime(1600, t + 0.08);
    o2.frequency.exponentialRampToValueAtTime(400, t + 0.5);
    o2.frequency.exponentialRampToValueAtTime(320, t + 1.0);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(0.18, t + 0.06);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
    o2.start(t); o2.stop(t + 1.0);
  },
  tada(ac) {
    const t = ac.currentTime;
    const chords = [[523,659,784],[659,784,1047],[784,1047,1319]];
    chords.forEach((chord, ci) => {
      chord.forEach(f => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'triangle';
        const off = ci * 0.14;
        o.frequency.setValueAtTime(f, t+off);
        g.gain.setValueAtTime(0.12, t+off);
        g.gain.exponentialRampToValueAtTime(0.001, t+off+0.35);
        o.start(t+off); o.stop(t+off+0.35);
      });
    });
  },
};

// ========== タブ切り替え ==========
const tabs = document.querySelectorAll('.tab');
const pages = document.querySelectorAll('.page');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    pages.forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.querySelector(`[data-page="${tab.dataset.tab}"]`).classList.add('active');
  });
});

// ========== ボタン動作 ==========
const colorMap = {
  red:'#FF6B6B', yellow:'#FFD93D', green:'#6BCB77', blue:'#4D96FF',
  orange:'#FF922B', purple:'#CC5DE8', teal:'#20C997', pink:'#F06595',
  lime:'#94D82D', sky:'#22B8CF'
};

document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();

    const ac = getCtx();
    const sound = btn.dataset.sound;
    if (SOUNDS[sound]) SOUNDS[sound](ac);

    // アニメーション
    btn.classList.remove('pop');
    void btn.offsetWidth;
    btn.classList.add('pop');

    // リップル
    const rect = btn.getBoundingClientRect();
    const r = document.createElement('div');
    r.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${(rect.width-size)/2}px;top:${(rect.height-size)/2}px`;
    btn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());

    // パーティクル
    const color = colorMap[btn.dataset.color] || '#FF6B6B';
    spawnParticles(e.clientX, e.clientY, color);
  });
});

function spawnParticles(x, y, color) {
  const container = document.getElementById('particles');
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 7 + Math.random() * 10;
    const angle = (Math.PI * 2 * i) / 10 + (Math.random() - 0.5) * 0.8;
    const dist = 55 + Math.random() * 70;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${color};
      left:${x - size/2}px; top:${y - size/2}px;
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
    `;
    container.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ========== PWA インストール ==========
let deferredPrompt;
const banner = document.getElementById('install-banner');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  banner.classList.add('show');
});

banner.addEventListener('click', async () => {
  banner.classList.remove('show');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
});

// ========== Service Worker 登録 ==========
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
